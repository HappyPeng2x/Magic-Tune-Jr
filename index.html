<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta http-equiv="cache-control" content="no-cache">
<meta charset="utf-8">
<title>MagicTune Jr</title>
<style>
/* ── Timeline pane layout ───────────────────────────────────────────── */
#timeline-pane {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    background: #1e1e1e;
    color: #eee;
    font-family: sans-serif;
    font-size: 12px;
    box-sizing: border-box;
    overflow: hidden;
}

/* ── Transport bar ───────────────────────────────────────────────────── */
.transport-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    background: #2d2d2d;
    border-bottom: 1px solid #444;
    flex-shrink: 0;
}
.transport-btn {
    padding: 4px 10px;
    border-radius: 4px;
    background: #444;
    color: #eee;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
    border: 1px solid #555;
}
.transport-btn:hover { background: #555; }
.transport-btn:active { background: #333; }
.transport-time {
    padding: 2px 8px;
    background: #111;
    border-radius: 3px;
    font-family: monospace;
    font-size: 13px;
    min-width: 60px;
    text-align: center;
    border: 1px solid #555;
}
.transport-sep { flex: 1; }

/* ── Timeline editor area ────────────────────────────────────────────── */
#timeline-editor {
    display: flex;
    flex: 1;
    overflow: hidden;
}

/* Label column */
#timeline-labels {
    width: 80px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #444;
}
#timeline-corner {
    height: 28px;
    background: #252525;
    border-bottom: 1px solid #444;
    flex-shrink: 0;
}
#timeline-label-list {
    overflow: hidden;
    flex: 1;
    background: #252525;
}
.timeline-label {
    display: flex;
    align-items: center;
    padding: 0 6px;
    font-size: 11px;
    color: #ccc;
    border-bottom: 1px solid #333;
    overflow: hidden;
    white-space: nowrap;
    box-sizing: border-box;
}

/* Scroll area (ruler + tracks) */
#timeline-scrollarea {
    flex: 1;
    overflow: auto;
    position: relative;
}

/* Ruler */
#timeline-ruler {
    height: 28px;
    background: #252525;
    border-bottom: 1px solid #444;
    position: sticky;
    top: 0;
    z-index: 5;
    cursor: col-resize;
    user-select: none;
}
.ruler-tick {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #555;
    pointer-events: none;
}
.ruler-label {
    position: absolute;
    top: 6px;
    font-size: 10px;
    color: #888;
    pointer-events: none;
    white-space: nowrap;
}

/* Track list */
#timeline-track-list {
    position: relative;
}
.timeline-row {
    border-bottom: 1px solid #333;
    position: relative;
    box-sizing: border-box;
}

/* Clips */
.timeline-clip {
    position: absolute;
    border-radius: 3px;
    display: flex;
    align-items: center;
    padding: 0 4px;
    font-size: 10px;
    color: #fff;
    overflow: hidden;
    white-space: nowrap;
    box-sizing: border-box;
    cursor: grab;
    user-select: none;
    border: 1px solid rgba(255,255,255,0.2);
    min-width: 8px;
}
.timeline-clip:active { cursor: grabbing; }

/* Playhead */
#timeline-playhead {
    position: absolute;
    top: 0;
    width: 2px;
    background: #e55;
    pointer-events: none;
    z-index: 10;
}

/* ── Layout fixes ──────────────────────────────────────────────────────── */
/* Transport bar must sit above the palette's block canvases which overflow
   into the timeline area.  The palette itself is z-index:10 so we go to 15. */
.transport-bar {
    position: relative !important;
    z-index: 15 !important;
}
</style>
<script>
    window.scratchJrPage = 'editor';
</script>
<script type="text/javascript" src="dist/app.bundle.js"></script>
</head>
<body style="background: white; margin: 0; padding: 0;">
<div class="frame" id="frame"></div>
<div class="libframe" id="libframe"></div>
<div class="paintframe" id="paintframe"></div>
</body>
</html>
